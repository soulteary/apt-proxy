# Compose example: run apt-proxy with a colocated MinIO bucket as cache storage.
#
# Usage:
#   docker compose up -d
#   curl -x http://127.0.0.1:3142 http://archive.ubuntu.com/ubuntu/dists/noble/Release
#
# All cached package bodies/headers land in the MinIO bucket "apt-proxy".
# The bucket is auto-provisioned by the `mc` sidecar on first start.

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: apt-proxy-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 12

  # One-shot job: wait for MinIO, then create the bucket. Idempotent.
  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/apt-proxy || true) &&
      mc anonymous set none local/apt-proxy
      "
    restart: "no"

  apt-proxy:
    # Build from the repo root: `docker compose build` after a `git clone`.
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: apt-proxy
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      APT_PROXY_STORAGE_BACKEND: s3
      APT_PROXY_S3_ENDPOINT: minio:9000
      APT_PROXY_S3_BUCKET: apt-proxy
      APT_PROXY_S3_ACCESS_KEY: minioadmin
      APT_PROXY_S3_SECRET_KEY: minioadmin
      APT_PROXY_S3_USE_SSL: "false"
      APT_PROXY_S3_USE_PATH_STYLE: "true"
      APT_PROXY_S3_PREFIX: "apt-proxy/"
    ports:
      - "3142:3142"

volumes:
  minio-data:
