version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
    - bodyclose
    - rowserrcheck
    - gocritic
    - revive
    - copyloopvar

  settings:
    gosec:
      excludes:
        - G104 # errcheck already covers unhandled errors better
        - G304 # cache dir / config path are user-supplied by design
        - G402 # TLS InsecureSkipVerify is configurable for benchmark probes
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-naming
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming
        - name: redefines-builtin-id
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - commentFormatting

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
